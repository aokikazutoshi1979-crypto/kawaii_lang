name: kawaii_lang
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.37+37

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.3
  http: ^1.1.0
  flutter_animate: ^4.5.0
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1  # ✅ 追加（最新バージョンに更新OK）
  firebase_auth: ^5.3.0
  cupertino_icons: ^1.0.8
  firebase_core: ^3.15.2
  cloud_firestore: ^5.6.8
  cloud_functions: ^5.5.2   # FlutterFire が Dart 3 に対応した最新バージョン:contentReference[oaicite:0]{index=0}
  uuid: ^4.3.1  # バージョンは最新安定版でOK
  purchases_flutter: ^9.2.1
  url_launcher: ^6.1.5
  device_info_plus: ^11.1.1
  just_audio: ^0.9.39
  path_provider: ^2.1.3
  record: ^6.0.0
  app_tracking_transparency: ^2.0.5
  firebase_crashlytics: ^4.3.10
  confetti: ^0.7.0

dependency_overrides:
  # win32: 3.1.1   # ← 3.x 系の最新（UnmodifiableUint8ListView を参照しない）に下げる
  win32: ^5.0.0
  win32_registry: 1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.2.17  # 最新版を確認してください

flutter_native_splash:
  color: "#FFFFFF"               # スプラッシュの背景色（例：白）
  image: assets/images/splash_logo.png  # 先ほどのロゴ画像など
  android: true
  ios: true

flutter_icons:
  image_path: "assets/images/characters/tumugi_icon.png"
  android: true
  ios: true

flutter:
  uses-material-design: true
  generate: true

  assets:
    - lib/assets/images/scene_icons/
    - assets/feedback/feedback_labels.json
    - assets/images/backgrounds/
    - assets/images/characters/
    - assets/images/characters/tumugi/
    - assets/images/characters/kasumi/
    - assets/images/icon/
    - assets/images/
    - assets/questions/

  fonts:
    - family: MplusRounded1c
      fonts:
        - asset: assets/fonts/MPLUSRounded1c-Regular.ttf
